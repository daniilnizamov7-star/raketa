<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Фон -->
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#3d1a6e"/>
      <stop offset="100%" stop-color="#1a0a3d"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Звёздочки фона -->
  <g fill="white" opacity="0.6">
    <circle cx="60"  cy="80"  r="2.5"/>
    <circle cx="440" cy="60"  r="2"/>
    <circle cx="480" cy="180" r="2"/>
    <circle cx="30"  cy="300" r="2"/>
    <circle cx="490" cy="350" r="2.5"/>
    <circle cx="80"  cy="420" r="2"/>
    <circle cx="430" cy="440" r="2"/>
  </g>
  <!-- Цветные искры -->
  <g>
    <path d="M100 120 L104 112 L108 120 L104 128Z" fill="#ff3cac" opacity="0.9"/>
    <path d="M400 100 L404 92  L408 100 L404 108Z" fill="#06d6a0" opacity="0.9"/>
    <path d="M450 280 L454 272 L458 280 L454 288Z" fill="#ffd166" opacity="0.9"/>
    <path d="M60  350 L64  342 L68  350 L64  358Z" fill="#2d9cff" opacity="0.9"/>
  </g>

  <!-- ===== РАКЕТА ===== -->
  <!-- Носовой конус (серый, двухтонный) -->
  <polygon points="256,52 208,148 304,148" fill="#e0e0e0"/>
  <polygon points="256,52 256,148 304,148" fill="#bdbdbd"/>

  <!-- Тело ракеты — пиксельные блоки букв РА КЕ ТА -->
  <!-- Ряд 1: РА -->
  <rect x="168" y="152" width="76" height="76" rx="8" fill="white"/>
  <rect x="252" y="152" width="76" height="76" rx="8" fill="white"/>
  <!-- Ряд 2: КЕ -->
  <rect x="168" y="236" width="76" height="76" rx="8" fill="white"/>
  <rect x="252" y="236" width="76" height="76" rx="8" fill="white"/>
  <!-- Ряд 3: ТА -->
  <rect x="168" y="320" width="76" height="76" rx="8" fill="white"/>
  <rect x="252" y="320" width="76" height="76" rx="8" fill="white"/>

  <!-- Буква Р -->
  <rect x="183" y="167" width="12" height="46" fill="#3d1a6e"/>
  <rect x="195" y="167" width="24" height="12" fill="#3d1a6e"/>
  <rect x="219" y="167" width="12" height="12" fill="#3d1a6e"/>
  <rect x="219" y="179" width="12" height="12" fill="#3d1a6e"/>
  <rect x="195" y="191" width="24" height="10" fill="#3d1a6e"/>

  <!-- Буква А (первая) -->
  <rect x="267" y="179" width="12" height="34" fill="#3d1a6e"/>
  <rect x="303" y="179" width="12" height="34" fill="#3d1a6e"/>
  <rect x="279" y="167" width="24" height="12" fill="#3d1a6e"/>
  <rect x="279" y="191" width="24" height="12" fill="#3d1a6e"/>

  <!-- Буква К -->
  <rect x="183" y="251" width="12" height="46" fill="#3d1a6e"/>
  <rect x="207" y="263" width="12" height="10" fill="#3d1a6e"/>
  <rect x="219" y="251" width="12" height="12" fill="#3d1a6e"/>
  <rect x="219" y="285" width="12" height="12" fill="#3d1a6e"/>
  <rect x="207" y="273" width="12" height="10" fill="#3d1a6e"/>

  <!-- Буква Е -->
  <rect x="267" y="251" width="12" height="46" fill="#3d1a6e"/>
  <rect x="279" y="251" width="30" height="10" fill="#3d1a6e"/>
  <rect x="279" y="271" width="24" height="10" fill="#3d1a6e"/>
  <rect x="279" y="287" width="30" height="10" fill="#3d1a6e"/>

  <!-- Буква Т -->
  <rect x="183" y="335" width="46" height="10" fill="#3d1a6e"/>
  <rect x="201" y="345" width="12" height="36" fill="#3d1a6e"/>

  <!-- Буква А (вторая) -->
  <rect x="267" y="347" width="12" height="34" fill="#3d1a6e"/>
  <rect x="303" y="347" width="12" height="34" fill="#3d1a6e"/>
  <rect x="279" y="335" width="24" height="12" fill="#3d1a6e"/>
  <rect x="279" y="359" width="24" height="12" fill="#3d1a6e"/>

  <!-- Крылья (боковые стабилизаторы) -->
  <ellipse cx="148" cy="368" rx="36" ry="24" fill="#bdbdbd"/>
  <ellipse cx="364" cy="368" rx="36" ry="24" fill="#bdbdbd"/>

  <!-- Сопла — цветные столбики как в логотипе -->
  <rect x="196" y="400" width="18" height="52" rx="9" fill="#ffd166"/>
  <rect x="220" y="400" width="18" height="60" rx="9" fill="#06d6a0"/>
  <rect x="244" y="400" width="18" height="60" rx="9" fill="#2d9cff"/>
  <rect x="268" y="400" width="18" height="52" rx="9" fill="#ff3cac"/>
  <rect x="292" y="400" width="18" height="44" rx="9" fill="#9b59ff"/>

  <!-- Огонь из сопел -->
  <ellipse cx="205" cy="455" rx="8"  ry="14" fill="#ff8c00" opacity="0.85"/>
  <ellipse cx="229" cy="462" rx="8"  ry="16" fill="#ff6b00" opacity="0.85"/>
  <ellipse cx="253" cy="462" rx="8"  ry="16" fill="#ffd166" opacity="0.85"/>
  <ellipse cx="277" cy="455" rx="8"  ry="14" fill="#ff3cac" opacity="0.85"/>
  <ellipse cx="301" cy="450" rx="7"  ry="12" fill="#9b59ff" opacity="0.85"/>
</svg>